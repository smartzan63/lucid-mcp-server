name: CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  release:
    types: [ published ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22.x, 24.x]

    steps:
    - uses: actions/checkout@v5

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v6
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run linter
      run: npm run lint || echo "Linter not configured"

    - name: Build project
      run: npm run build

    - name: Run tests
      run: npm test

  publish:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'release'

    permissions:
      contents: read
      id-token: write   # required for npm trusted publishing (OIDC) + provenance

    steps:
    - uses: actions/checkout@v5

    - name: Use Node.js 22.x
      uses: actions/setup-node@v6
      with:
        node-version: '22.x'
        cache: 'npm'

    # Trusted publishing (OIDC) needs npm >= 11.5.1; upgrade the bundled CLI.
    - name: Upgrade npm
      run: npm install -g npm@latest

    - name: Install dependencies
      run: npm ci

    - name: Build project
      run: npm run build

    # No registry-url / NODE_AUTH_TOKEN: setting registry-url makes setup-node
    # write a placeholder _authToken into .npmrc, which blocks the OIDC token
    # exchange. Without it, npm authenticates the publish via trusted publishing
    # (configured on npmjs.com for this repo + workflow). Provenance is automatic.
    - name: Publish to NPM
      run: npm publish --provenance --access public
