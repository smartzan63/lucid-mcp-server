name: CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  release:
    types: [ published ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22.x, 24.x]

    steps:
    - uses: actions/checkout@v5

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v6
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run linter
      run: npm run lint || echo "Linter not configured"

    - name: Build project
      run: npm run build

    - name: Run tests
      run: npm test

  publish:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'release'

    permissions:
      contents: read
      id-token: write   # required for npm trusted publishing (OIDC) + provenance

    steps:
    - uses: actions/checkout@v5

    # npm docs recipe for trusted publishing: Node 24 (bundles npm >= 11.5.1,
    # and fixes the Node 22 OIDC auth bug), registry-url set, and caching
    # disabled for release builds.
    - name: Use Node.js 24
      uses: actions/setup-node@v6
      with:
        node-version: '24'
        registry-url: 'https://registry.npmjs.org'
        package-manager-cache: false

    - name: Show tool versions
      run: |
        echo "node: $(node --version)"
        echo "npm:  $(npm --version)"

    - name: Install dependencies
      run: npm ci

    - name: Build project
      run: npm run build

    # Auth is OIDC trusted publishing (configured on npmjs.com for repo
    # smartzan63/lucid-mcp-server, workflow ci.yml). NODE_AUTH_TOKEN must stay
    # unset or npm uses it instead of OIDC. Provenance is automatic.
    - name: Publish to NPM
      run: npm publish
