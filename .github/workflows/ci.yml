name: CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  release:
    types: [ published ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run linter
      run: npm run lint || echo "Linter not configured"

    - name: Build project
      run: npm run build

    - name: Run tests
      run: npm test

    - name: Run test coverage
      run: npm run test:coverage

    - name: Upload coverage to Codecov
      if: matrix.node-version == '20.x'
      continue-on-error: true
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage/lcov.info
        flags: unittests
        name: codecov-umbrella

  publish:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'release'

    permissions:
      contents: read
      id-token: write   # required for npm trusted publishing (OIDC) + provenance

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js 22.x
      uses: actions/setup-node@v4
      with:
        node-version: '22.x'
        registry-url: 'https://registry.npmjs.org'
        cache: 'npm'

    # Trusted publishing (OIDC) requires npm >= 11.5.1; the version bundled
    # with Node 22 is older, so upgrade the CLI before publishing.
    - name: Upgrade npm
      run: npm install -g npm@latest

    - name: Install dependencies
      run: npm ci

    - name: Build project
      run: npm run build

    # No NODE_AUTH_TOKEN: authentication is via OIDC trusted publishing,
    # configured on npmjs.com for this repo + workflow. Provenance is automatic.
    - name: Publish to NPM
      run: npm publish --provenance --access public
